<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call Companion Options</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        background: #f5f8f7;
        color: #1e2a26;
        font-family: "Avenir Next", "Segoe UI Variable", "Nunito Sans", sans-serif;
      }

      main {
        max-width: 760px;
        margin: 32px auto;
        background: #ffffff;
        border: 1px solid #d1ddda;
        border-radius: 14px;
        box-shadow: 0 10px 28px rgba(30, 44, 39, 0.1);
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0 0 16px;
        color: #3c534c;
      }

      .field {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 700;
      }

      input[type="text"] {
        width: 100%;
        border: 1px solid #c2d2cd;
        border-radius: 8px;
        font-size: 13px;
        padding: 8px 10px;
      }

      textarea {
        width: 100%;
        border: 1px solid #c2d2cd;
        border-radius: 8px;
        font-size: 12px;
        padding: 8px 10px;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        min-height: 200px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      #save {
        background: #1f6f57;
        color: #fff;
      }

      #reset {
        background: #e9efed;
        color: #2f4841;
      }

      #status {
        margin-top: 12px;
        font-size: 13px;
        color: #2f4841;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pipedrive Call Companion</h1>
      <p>Save your Pipedrive API token and panel behavior preferences.</p>

      <div class="field">
        <label for="apiToken">Pipedrive API token</label>
        <input id="apiToken" type="text" autocomplete="off" placeholder="Paste your Pipedrive API token" />
      </div>

      <div class="field">
        <label for="emailTemplatesByStage">No Answer email templates by stage (JSON)</label>
        <textarea
          id="emailTemplatesByStage"
          spellcheck="false"
          placeholder='{"default":[{"label":"Email #1","subject":"...","body":"..."}],"stage:1":[...]}'
        ></textarea>
        <p>
          Keys: <code>default</code>, <code>stage:1</code>, <code>stage:2</code>, etc. Use tokens:
          <code>{{personFirstName}}</code>, <code>{{personName}}</code>, <code>{{orgName}}</code>,
          <code>{{dealTitle}}</code>, <code>{{dealValue}}</code>, <code>{{dealStage}}</code>, <code>{{jobTitle}}</code>.
        </p>
      </div>

      <label class="check">
        <input id="autoOpenPanel" type="checkbox" />
        Auto-open panel on Deal/Person pages
      </label>

      <label class="check">
        <input id="showNotes" type="checkbox" />
        Show recent notes
      </label>

      <label class="check">
        <input id="showActivities" type="checkbox" />
        Show recent activities
      </label>

      <div class="row">
        <button id="save" type="button">Save</button>
        <button id="reset" type="button">Reset defaults</button>
      </div>

      <div id="status" role="status" aria-live="polite"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
